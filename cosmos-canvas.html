// ─── SEEDED RNG ───────────────────────────────────────────────────────────────
function mkRng(seed) {
  let s = (seed | 0) + 1;
  return () => {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 15), 0x1b873593);
    s ^= s >>> 16;
    return (s >>> 0) / 4294967296;
  };
}

// ─── GENERATE NODE POSITIONS ──────────────────────────────────────────────────
function buildNodes() {
  const nodes = [];
  const byId  = {};
  const GA    = 2.399963229; // golden angle

  const TIER2_ARR = [...TIER2_IDS]; // ordered array for index-based distribution

  DOMAIN_NAMES.forEach((domain, di) => {
    const o   = OUTCOMES[domain];
    const rng = mkRng(di * 91111 + 7);
    const cx  = CLUSTER_CX[domain];

    // Build shuffled status array
    const statArr = [
      ...Array(o.confirmed).fill('confirmed'),
      ...Array(o.invalidated).fill('invalidated'),
      ...Array(o.unverified).fill('unverified'),
    ];
    for (let i = statArr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [statArr[i], statArr[j]] = [statArr[j], statArr[i]];
    }

    // Phase 6 distribution: finance=1 (idx 0), science=7 (idx 1-7), technology=45 (idx 8-52)
    const tier2List = TIER2_ARR.filter((_, idx) => {
      if (domain === 'finance')     return idx < 1;
      if (domain === 'science')     return idx >= 1 && idx < 8;
      if (domain === 'technology')  return idx >= 8;
    });

    for (let i = 0; i < o.total; i++) {
      const spread = 0.82 + rng() * 0.36;
      const r = BASE_RADIUS * Math.sqrt((i + 0.7) / o.total) * spread;
      const theta = i * GA + (rng() - 0.5) * 0.18;
      const nx = cx + r * Math.cos(theta);
      const ny = CLUSTER_CY + r * Math.sin(theta) * 0.82;
      const conf = 0.70 + rng() * 0.29;
      const status = statArr[i] || 'unverified';

      const id = tier2List[i] || `${domain}-${i}`;
      const node = { id, domain, status, conf, nx, ny, isTier2: TIER2_IDS.has(id) };
      nodes.push(node);
      byId[id] = node;
    }
  });

  return { nodes, byId };
}

          </button>
          <button className={`toggle-btn adversarial ${onlyAdversarial?'active':''}`}
            onClick={() => { setOnlyAdversarial(v=>!v); setOnlyTier2(false); }}>
            🛡 adversarial filter
          </button>
          <button className={`toggle-btn conflict ${showConflict?'active':''}`}
            onClick={() => setShowConflict(v=>!v)}>
            conflict edges
          </button>
        </div>
        <div className="stats-bar">
          <div className="stat-pill stat-confirmed">✓ {totalC}</div>
          <div className="stat-pill stat-invalidated">✗ {totalI}</div>
          {totalU > 0 && <div className="stat-pill stat-unverified">? {totalU}</div>}
          <div className="stat-pill" style={{background:'rgba(255,215,0,0.1)',color:'#FFD700',border:'1px solid rgba(255,215,0,0.25)'}}>
            ⚡ 53
          </div>
          <div className="stat-pill" style={{background:'rgba(0,217,255,0.08)',color:'#00D9FF',border:'1px solid rgba(0,217,255,0.2)'}}>
            🛡 53
          </div>
        </div>
      </div>

      {/* ── MAIN AREA ── */}
      <div className="main-area">
        <div className="svg-area" ref={containerRef} onMouseLeave={()=>setHovered(null)}>
          <svg width={svgW} height={svgH}>
            <defs>
              {DOMAIN_NAMES.map(d => (
                <radialGradient key={d} id={`bg-${d}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={DOMAIN_COLORS[d]} stopOpacity="0.55"/>
                  <stop offset="100%" stopColor={DOMAIN_COLORS[d]} stopOpacity="0"/>
                </radialGradient>
              ))}
              <filter id="t2glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="1.8" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="advglow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            {/* Cluster glow backgrounds */}
            {DOMAIN_NAMES.filter(d=>vis[d]).map(d => {
              const r = BASE_RADIUS * svgW * 1.3;
              return <ellipse key={d}
                cx={px(CLUSTER_CX[d])} cy={py(CLUSTER_CY)}
                rx={r} ry={r*0.76}
                fill={`url(#bg-${d})`} opacity={0.07}/>;
            })}

            {/* Finance T1 demotion glow — subtle red haze */}
            {vis.finance && (
              <ellipse
                cx={px(CLUSTER_CX.finance)} cy={py(CLUSTER_CY)}
                rx={BASE_RADIUS*svgW*0.88} ry={BASE_RADIUS*svgW*0.67}
                fill="none" stroke="#FF5D38" strokeWidth={1.2}
                strokeDasharray="8,4" opacity={0.18}/>
            )}

            {/* Domain labels */}
            {DOMAIN_NAMES.filter(d=>vis[d]).map(d => {
              const isT1 = TRUST[d].tier === 1;
              return (
                <g key={d}>
                  <text
                    x={px(CLUSTER_CX[d])} y={22}
                    textAnchor="middle" fill={DOMAIN_COLORS[d]}
                    opacity={0.45} fontSize={10} fontFamily="'SF Mono',monospace"
                    letterSpacing={2}>{d.toUpperCase()}</text>
                  {isT1 && (
                    <text
                      x={px(CLUSTER_CX[d])} y={33}
                      textAnchor="middle" fill="#FF5D38"
                      opacity={0.7} fontSize={8} fontFamily="'SF Mono',monospace">
                      TIER 1 ↓
                    </text>
                  )}
                </g>
              );
            })}

            {/* Tier 2 threshold ring (dashed ellipse at 85% radius) */}
            {DOMAIN_NAMES.filter(d=>vis[d]).map(d => {
              const r = BASE_RADIUS * svgW * 0.92;
              return <ellipse key={`t2-${d}`}
                cx={px(CLUSTER_CX[d])} cy={py(CLUSTER_CY)}
                rx={r} ry={r*0.76}
                fill="none" stroke="#2ea043" strokeWidth={0.6}
                strokeDasharray="5,3" opacity={0.3}/>;
            })}

            {/* Conflict edges */}
            {showConflict && CONFLICTS.map(([a,b], i) => {
              const src = ALL_NODES.find(n => n.id.startsWith(a));
              const tgt = ALL_NODES.find(n => n.id.startsWith(b));
              if (!src || !tgt) return null;
              if (!vis[src.domain] || !vis[tgt.domain]) return null;
              return <line key={i}
                x1={px(src.nx)} y1={py(src.ny)}
                x2={px(tgt.nx)} y2={py(tgt.ny)}
                stroke="#FF6B6B" strokeWidth={0.8}
                strokeDasharray="3,3" opacity={0.45}/>;
            })}

            {/* Nodes — non-tier2 first, then tier2 on top */}
            {[...visible.filter(n=>!n.isTier2), ...visible.filter(n=>n.isTier2)].map(node => {
              const x = px(node.nx);
              const y = py(node.ny);
              const col = DOMAIN_COLORS[node.domain];
              const r = 1.4 + node.conf * 2.6;
              const op = node.status==='confirmed' ? 0.82
                : node.status==='invalidated' ? 0.22 : 0.45;
              const isHov = hovered?.id === node.id;
              const isSel = selected?.id === node.id;

              return (
                <g key={node.id}
                  onMouseMove={e => { setHovered(node); setTipPos({x:e.clientX+14,y:e.clientY-10}); }}
                  onMouseLeave={() => setHovered(null)}
                  onClick={() => setSelected(node === selected ? null : node)}
                  style={{cursor:'pointer'}}
                >
                  {/* Tier2 gold ring */}
                  {node.isTier2 && (
                    <circle cx={x} cy={y} r={r+2.8}
                      fill="none" stroke="#FFD700" strokeWidth={1.1}
                      opacity={0.65} filter="url(#t2glow)"/>
                  )}
                  {/* Adversarial survived — cyan inner ring */}
                  {node.isTier2 && (
                    <circle cx={x} cy={y} r={r-0.4}
                      fill="none" stroke="#00D9FF" strokeWidth={0.55}
                      opacity={0.6} filter="url(#advglow)"/>
                  )}
                  {/* Hover / select ring */}
                  {(isHov || isSel) && (
                    <circle cx={x} cy={y} r={r+4}
                      fill="none" stroke={col} strokeWidth={0.9} opacity={0.55}/>
                  )}
                  {/* Node */}
                  <circle cx={x} cy={y} r={r} fill={col} opacity={op}/>
                  {/* Invalidated outline */}
                  {node.status==='invalidated' && (
                    <circle cx={x} cy={y} r={r}
                      fill="none" stroke="#f85149" strokeWidth={0.7} opacity={0.35}/>
                  )}
                </g>
              );
            })}

            {/* Tier 2 threshold label */}
            {vis.finance && (
              <text
                x={px(CLUSTER_CX.finance) - BASE_RADIUS*svgW*0.92 - 4}
                y={py(CLUSTER_CY)+3}
                fill="#2ea043" fontSize={8} textAnchor="end" opacity={0.55}>85%</text>
            )}
          </svg>

          {/* Tooltip */}
          {hovered && (
            <div className="tooltip" style={{left:tipPos.x, top:tipPos.y}}>
              {KNOWN[hovered.id] ? (
                <>
                  <div style={{fontWeight:600,color:'#E6EDF3',marginBottom:2}}>{KNOWN[hovered.id].s}</div>
                  <div style={{color:'#8B949E',fontSize:10}}>{KNOWN[hovered.id].r} → {KNOWN[hovered.id].o}</div>
                </>
              ) : (
                <div style={{color:DOMAIN_COLORS[hovered.domain]}}>{hovered.domain} claim</div>
              )}
              <div style={{marginTop:4,fontSize:10,color:'#8B949E'}}>
                conf {(hovered.conf*100).toFixed(1)}%&nbsp;·&nbsp;
                <span style={{color:hovered.status==='confirmed'?'#56d364':hovered.status==='invalidated'?'#f85149':'#8B949E'}}>
                  {hovered.status}
                </span>
                {hovered.isTier2 && <span style={{color:'#FFD700',marginLeft:4}}>⚡ jarvis_tier2</span>}
                {hovered.isTier2 && <span style={{color:'#00D9FF',marginLeft:4}}>🛡 survived</span>}
              </div>
            </div>
          )}
        </div>

        {/* ── SIDE PANEL ── */}
        <div className="side-panel">
          {/* Trust scores */}
          <div className="panel-section">
            <div className="panel-title">Trust Scores (rolling w=1000)</div>
            {DOMAIN_NAMES.map(d => {
              const t = TRUST[d];
              const isT1 = t.tier === 1;
              const delta = t.score - t.p5score;
              const deltaStr = (delta >= 0 ? '+' : '') + (delta*100).toFixed(2) + '%';
              return (
                <div key={d} className="trust-bar-row">
                  <div className="trust-bar-label">
                    <span style={{color:DOMAIN_COLORS[d],fontSize:11}}>{d}</span>
                    <span style={{display:'flex',alignItems:'center',gap:4}}>
                      <span style={{fontSize:9,color:delta>=0?'#56d364':'#f85149',opacity:.8}}>{deltaStr}</span>
                      <span style={{color:isT1?'#FF5D38':DOMAIN_COLORS[d],fontSize:11,fontWeight:700}}>
                        {(t.score*100).toFixed(2)}%
                      </span>
                      {isT1
                        ? <span style={{color:'#FF5D38',fontSize:9}}>T1↓</span>
                        : <span style={{color:'#2ea043',fontSize:9}}>T2✓</span>
                      }
                    </span>
                  </div>
                  <div className="trust-bar-track">
                    <div className="trust-bar-fill"
                      style={{width:`${t.score*100}%`,background:isT1?'#FF5D38':DOMAIN_COLORS[d],opacity:.65}}/>
                    {/* Threshold marker at 85% */}
                    <div style={{position:'absolute',left:'85%',top:-1,width:1,height:7,background:'#2ea043',opacity:0.7}}/>
                    {/* Phase 5 ghost marker */}
                    <div style={{
                      position:'absolute',left:`${t.p5score*100}%`,top:-1,
                      width:1,height:7,background:'#484F58',opacity:0.6
                    }}/>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:9,color:'#484F58',marginTop:5}}>
              threshold line at 85.00% · ghost = Phase 5
            </div>
          </div>

          {/* Outcome distribution */}
          <div className="panel-section">
            <div className="panel-title">Outcomes (all resolved)</div>
            {DOMAIN_NAMES.map(d => {
              const o = OUTCOMES[d];
              return (
                <div key={d} style={{marginBottom:9}}>
                  <div style={{color:DOMAIN_COLORS[d],fontSize:10,marginBottom:3}}>{d}</div>
                  {[['confirmed','#56d364',o.confirmed],['invalidated','#f85149',o.invalidated]].map(([s,c,n])=>(
                    <div key={s} className="outcome-row">
                      <div className="outcome-dot" style={{background:c}}/>
                      <div className="outcome-bar-track">
                        <div className="outcome-bar-fill" style={{width:`${n/o.total*100}%`,background:c,opacity:.75}}/>
                      </div>
                      <span className="outcome-count">{n}</span>
                    </div>
                  ))}
                  <div style={{fontSize:9,color:'#484F58',marginTop:1}}>
                    res: {(o.confirmed/o.total*100).toFixed(1)}% · {o.total} total
                  </div>
                </div>
              );
            })}
          </div>

          {/* Phase 6 Autonomous stats */}
          <div className="panel-section">
            <div className="panel-title">Phase 6 — Autonomous</div>
            <div style={{fontSize:10,color:'#8B949E',lineHeight:1.8}}>
              <div><span style={{color:'#FFD700'}}>53</span> promoted by jarvis_tier2</div>
              <div style={{paddingLeft:8}}><span style={{color:'#4488FF'}}>1</span> finance <span style={{color:'#FF5D38',fontSize:9}}>T1↓</span></div>
              <div style={{paddingLeft:8}}><span style={{color:'#FF8844'}}>7</span> science</div>
              <div style={{paddingLeft:8}}><span style={{color:'#AA44FF'}}>45</span> technology</div>
              <div style={{marginTop:3,borderTop:'1px solid #21262D',paddingTop:3}}>
                <div><span style={{color:'#00D9FF'}}>53</span> adversarial_survived</div>
                <div><span style={{color:'#484F58'}}> 0</span> vulnerable / compromised</div>
                <div><span style={{color:'#FF6B6B'}}>8</span> conflict edges</div>
              </div>
              <div style={{marginTop:3,borderTop:'1px solid #21262D',paddingTop:3}}>
                <div style={{color:'#484F58',fontSize:9}}>90-day clean clock</div>
                <div style={{fontSize:9}}>
                  start: <span style={{color:'#E6EDF3'}}>2026-03-24</span>
                </div>
                <div style={{fontSize:9}}>
                  target: <span style={{color:'#2ea043'}}>2026-06-22</span>
                </div>
              </div>
            </div>
          </div>

          {/* Legend */}
          <div className="panel-section">
            <div className="panel-title">Legend</div>
            <div className="legend-row"><div className="legend-dot" style={{background:'#56d364'}}/> confirmed</div>
            <div className="legend-row"><div className="legend-dot" style={{background:'#f85149',opacity:.35}}/> invalidated</div>
            <div className="legend-row"><div className="legend-ring"/> jarvis_tier2 (gold ring)</div>
            <div className="legend-row">
              <div style={{width:10,height:10,borderRadius:'50%',border:'2px solid #00D9FF',flexShrink:0,background:'transparent'}}/>
              adversarial shield (cyan)
            </div>
            <div className="legend-row">
              <div style={{width:16,height:0,borderTop:'1px dashed #FF6B6B',opacity:.6,flexShrink:0}}/>
              conflict edge
            </div>
            <div className="legend-row">
              <div style={{width:16,height:0,borderTop:'1px dashed #2ea043',opacity:.5,flexShrink:0}}/>
              Tier 2 threshold (85%)
            </div>
            <div className="legend-row">
              <div style={{width:16,height:0,borderTop:'1px dashed #FF5D38',opacity:.4,flexShrink:0}}/>
              finance T1 demotion ring
            </div>
            <div className="pipeline-row">
              <div style={{color:'#6E7681',marginBottom:2}}>6-AGENT PIPELINE</div>
              <span className="pipeline-step">Vanguard</span>
              <span className="pipeline-arrow"> → </span>
              <span className="pipeline-step">Skeptic</span>
              <span className="pipeline-arrow"> → </span>
              <span className="pipeline-step">Advocate</span>
              <span className="pipeline-arrow"> → </span>
              <br/>
              <span className="pipeline-step">Jarvis</span>
              <span className="pipeline-arrow"> → </span>
              <span className="pipeline-step adv">Adversarial</span>
              <span className="pipeline-arrow"> → </span>
              <span className="pipeline-step" style={{color:'#FFD700'}}>Promote</span>
            </div>
          </div>

          {/* Inspect */}
          <div style={{flex:1,padding:10,overflow:'auto'}}>
            <div className="panel-title">Inspect</div>
            {!selected ? (
              <div className="inspect-empty">Click a node to inspect</div>
            ) : (
              <>
                <div className="inspect-field">
                  <div className="inspect-key">domain</div>
                  <div className="inspect-val" style={{color:DOMAIN_COLORS[selected.domain]}}>
                    {selected.domain}
                    {TRUST[selected.domain].tier === 1 &&
                      <span style={{color:'#FF5D38',fontSize:9,marginLeft:4}}>TIER 1</span>}
                  </div>
                </div>
                <div className="inspect-field">
                  <div className="inspect-key">confidence</div>
                  <div className="inspect-val">{(selected.conf*100).toFixed(1)}%</div>
                </div>
                <div className="inspect-field">
                  <div className="inspect-key">outcome</div>
                  <span className={`inspect-badge badge-${selected.status}`}>{selected.status}</span>
                </div>
                {selected.isTier2 && (
                  <>
                    <div className="inspect-field">
                      <div className="inspect-key">promoted_by</div>
                      <span className="inspect-badge badge-jarvis">⚡ jarvis_tier2</span>
                    </div>
                    <div className="inspect-field">
                      <div className="inspect-key">adversarial</div>
                      <span className="inspect-badge badge-adv">🛡 survived</span>
                    </div>
                  </>
                )}
                {KNOWN[selected.id] && (
                  <>
                    <div className="inspect-field">
                      <div className="inspect-key">subject</div>
                      <div className="inspect-val">{KNOWN[selected.id].s}</div>
                    </div>
                    <div className="inspect-field">
                      <div className="inspect-key">relation</div>
                      <div className="inspect-val">{KNOWN[selected.id].r}</div>
                    </div>
                    <div className="inspect-field">
                      <div className="inspect-key">object</div>
                      <div className="inspect-val">{KNOWN[selected.id].o}</div>
                    </div>
                  </>
                )}
                <div className="inspect-field" style={{marginTop:8}}>
                  <div className="inspect-key">id</div>
                  <div style={{fontSize:9,color:'#484F58',wordBreak:'break-all'}}>{selected.id}</div>
                </div>
              </>
            )}
          </div>
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div className="footer-bar">
        <span>NOOSPHERE v2</span>
        <span className="tier2-sep">·</span>
        <span>corpus: <span className="footer-val" style={{color:'#58A6FF',fontWeight:700}}>{TOTAL}</span> claims</span>
        <span className="tier2-sep">·</span>
        <span>showing: <span className="footer-val">{visible.length}</span></span>
        <span className="tier2-sep">·</span>
        <span>tier2: <span className="footer-val" style={{color:'#FFD700'}}>53</span></span>
        <span className="tier2-sep">·</span>
        <span>adversarial: <span className="footer-val" style={{color:'#00D9FF'}}>53/53 survived</span></span>
        <span className="tier2-sep">·</span>
        <span>finance: <span className="footer-val" style={{color:'#FF5D38'}}>TIER 1 ↓</span></span>
        <span style={{marginLeft:'auto',color:'#484F58'}}>Phase 6 · cycles 17-22 · 2026-03-24</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
