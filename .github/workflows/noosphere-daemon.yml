name: Noosphere Pipeline Daemon

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      step:
        description: 'Run only this step (1-13), leave blank for full cycle'
        required: false
        default: ''
        type: string
      health_only:
        description: 'Health check only (no pipeline)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  pipeline:
    name: Pipeline Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Smoke test
        run: echo "Runner alive — event=${{ github.event_name }}"
