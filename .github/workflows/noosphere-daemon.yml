name: Noosphere Pipeline Daemon

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

jobs:
  pipeline:
    name: Pipeline Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline cycle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          DAEMON_BATCH_SIZE: '20'
          DAEMON_PROMOTION_THRESHOLD: '0.90'
          DAEMON_AUDIT_SAMPLE_RATE: '0.10'
        run: python noosphere_daemon.py

      - name: Upload cycle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-log-${{ github.run_id }}
          path: /tmp/noosphere-*.log
          if-no-files-found: ignore
          retention-days: 30
